version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.0
  go_router: ^14.0.0
  pdf: ^3.11.1
  printing: ^5.14.2
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  file_picker: ^8.0.7
  excel: ^4.0.6
  page_transition: ^2.1.0
  image_picker : ^0.8.7+4
  particles_network: ^1.9.3
  share_plus: ^10.0.0     # if not already present
  syncfusion_flutter_xlsio: ^29.2.11
  open_file: ^3.5.11   # use latest version
  universal_html: ^2.2.4
  google_fonts: ^6.2.1
  crypto: ^3.0.3
  fl_chart: ^1.2.0
  file_selector: ^1.0.0 
  shared_preferences: ^2.5.5
  http: ^1.6.0
  provider: ^6.1.5+1

  intl: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/aarti_logo.png
    - assets/images/letterhead.png
    - assets/images/aarti_signature.png




    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf